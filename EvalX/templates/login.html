<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- SweetAlert -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <title>EvalX Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 85%;
            max-width: 1300px;
            gap: 60px;
        }

        .left {
            color: white;
        }

            .left h1 {
                font-size: 64px;
                font-weight: 600;
                margin-bottom: 10px;
            }

            .left p {
                font-size: 20px;
                color: #d1d1d1;
                max-width: 400px;
            }

        .login-box {
            width: 400px;
            padding: 40px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            color: white;
        }

            .login-box h2 {
                text-align: center;
                margin-bottom: 25px;
            }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 8px;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

            input::placeholder {
                color: #ccc;
            }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

            .btn:hover {
                transform: scale(1.05);
                box-shadow: 0 0 15px rgba(0, 114, 255, 0.6);
            }

        .register-link {
            text-align: center;
            margin-top: 15px;
        }

            .register-link a {
                color: #00c6ff;
                text-decoration: none;
            }

                .register-link a:hover {
                    text-decoration: underline;
                }
    </style>
</head>

<body>

    <div class="container">

        <div class="left">
            <h1>EvalX</h1>
            <p>Secure Online Examination System with Anti-Cheating Features</p>
        </div>

        <div class="login-box">
            <h2>Sign in</h2>

            <form method="POST">
                <input type="text" name="username" placeholder="Enter Username" required>
                <input type="password" name="password" placeholder="Enter Password" required>

                <button type="submit" class="btn">Login</button>
            </form>

            <div class="register-link">
                <p>New user? <a href="/register">Register here</a></p>
            </div>
        </div>

    </div>

    <!-- Error Popup -->
    {% if message %}
    <script>
Swal.fire({
    icon: 'error',
    title: 'Login Failed',
    text: '{{ message }}',
    confirmButtonColor: '#0072ff'
});
    </script>
    {% endif %}

</body>
</html>
