<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EvalX Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI';
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #020617;
            border-right: 1px solid #1e293b;
            padding: 20px;
        }

            .sidebar h2 {
                text-align: center;
                margin-bottom: 40px;
            }

            .sidebar a {
                display: block;
                padding: 12px;
                margin-bottom: 10px;
                border-radius: 8px;
                color: #cbd5f5;
                text-decoration: none;
            }

                .sidebar a:hover {
                    background: #1e293b;
                    color: white;
                }

        .logout {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #ef4444;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            padding: 30px;
        }

        /* TABLE */
        table {
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #020617;
            color: #38bdf8;
        }

        td {
            vertical-align: middle;
        }

        .btn-delete {
            background: #ef4444;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            text-decoration: none;
        }

            .btn-delete:hover {
                opacity: 0.85;
            }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>⚡ EvalX</h2>

        <a href="/admin">🏠 Dashboard</a>

        <a href="/logout" class="logout">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h2 class="mb-4">🛠 Admin Panel - Manage Users</h2>

        <table class="table table-dark table-bordered text-center">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for user in users %}
                <tr>

                    <td>{{ user['id'] }}</td>
                    <td>{{ user['username'] }}</td>
                    <td style="color:#22c55e; font-weight:bold;">
                        {{ user['role'] }}
                    </td>

                    <td>
                        <a href="/delete_user/{{ user['id'] }}"
                           class="btn-delete"
                           onclick="return confirm('Are you sure you want to delete this user?')">
                            ❌ Delete
                        </a>
                    </td>

                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</body>
</html>
