<!DOCTYPE html>
<html>
<head>
    <title>Student Attempts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .container {
            margin-top: 40px;
        }

        table {
            background: #1e293b;
        }

        th, td {
            text-align: center;
            vertical-align: middle;
        }

        .btn-release {
            background: #22c55e;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
        }

            .btn-release:hover {
                opacity: 0.9;
            }

        .badge-released {
            color: #22c55e;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2 class="mb-4">📊 Student Attempts</h2>

        <table class="table table-dark table-bordered">

            <thead>
                <tr>
                    <th>Student</th>
                    <th>Score</th>
                    <th>Status</th>
                    <th>Result</th>
                </tr>
            </thead>

            <tbody>
                {% for a in attempts %}
                <tr>

                    <td>{{ a['username'] }}</td>
                    <td>{{ a['score'] }}</td>
                    <td>{{ a['status'] }}</td>

                    <td>
                        {% if a['released'] == 1 %}
                        <span class="badge-released">
                            ✔ Released
                        </span>
                        {% else %}
                        <a href="/release_result/{{ a['result_id'] }}"
                           class="btn-release"
                           onclick="return confirm('Release this result?')">
                            🚀 Release
                        </a>
                        {% endif %}
                    </td>

                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</body>
</html>
