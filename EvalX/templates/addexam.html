<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Exam - EvalX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI';
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #020617;
            border-right: 1px solid #1e293b;
            padding: 20px;
        }

            .sidebar h2 {
                text-align: center;
                margin-bottom: 40px;
            }

            .sidebar a {
                display: block;
                padding: 12px;
                margin-bottom: 10px;
                border-radius: 8px;
                color: #cbd5f5;
                text-decoration: none;
            }

                .sidebar a:hover {
                    background: #1e293b;
                    color: white;
                }

        .logout {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #ef4444;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            padding: 40px;
        }

        .form-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #334155;
            max-width: 600px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            background: #0f172a;
            color: white;
        }

            input::placeholder {
                color: #94a3b8;
            }

        .btn-create {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #06b6d4, #3b82f6);
            color: white;
            font-weight: bold;
        }

            .btn-create:hover {
                opacity: 0.9;
            }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>⚡ EvalX</h2>

        <a href="/staff">🏠 Dashboard</a>
        <a href="/add_exam">➕ Create Exam</a>

        <a href="/logout" class="logout">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h2 class="mb-4">📝 Create New Exam</h2>

        <div class="form-card">

            <form method="POST">

                <input type="text" name="title" placeholder="Exam Title" required>

                <input type="text" name="subject" placeholder="Subject" required>

                <input type="number" name="duration" placeholder="Duration (minutes)" required>

                <label>Start Time</label>
                <input type="datetime-local" name="start_time" required>

                <label>End Time</label>
                <input type="datetime-local" name="end_time" required>

                <button type="submit" class="btn-create">
                    🚀 Create Exam
                </button>

            </form>

        </div>

    </div>

</body>
</html>
