<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Questions - EvalX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI';
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #020617;
            border-right: 1px solid #1e293b;
            padding: 20px;
        }

            .sidebar h2 {
                text-align: center;
                margin-bottom: 40px;
            }

            .sidebar a {
                display: block;
                padding: 12px;
                margin-bottom: 10px;
                border-radius: 8px;
                color: #cbd5f5;
                text-decoration: none;
            }

                .sidebar a:hover {
                    background: #1e293b;
                    color: white;
                }

        .logout {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #ef4444;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
        }

        .main {
            margin-left: 260px;
            padding: 40px;
        }

        .form-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #334155;
            max-width: 700px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            background: #0f172a;
            color: white;
        }

        .btn-add {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #06b6d4, #3b82f6);
            color: white;
            font-weight: bold;
        }

            .btn-add:hover {
                opacity: 0.9;
            }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>⚡ EvalX</h2>

        <a href="/staff">🏠 Dashboard</a>
        <a href="/addexam">➕ Create Exam</a>

        <a href="/logout" class="logout">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h2 class="mb-4">📝 Add Questions (Exam ID: {{ exam_id }})</h2>

        <div class="form-card">

            <form method="POST">

                <input type="text" name="question" placeholder="Enter Question" required>

                <input type="text" name="option1" placeholder="Option 1" required>
                <input type="text" name="option2" placeholder="Option 2" required>
                <input type="text" name="option3" placeholder="Option 3" required>
                <input type="text" name="option4" placeholder="Option 4" required>

                <select name="correct" required>
                    <option value="">Select Correct Answer</option>
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                    <option value="option4">Option 4</option>
                </select>

                <button type="submit" class="btn-add">
                    ➕ Add Question
                </button>

            </form>
            <hr style="margin:40px 0;">

            <h3>📋 Added Questions</h3>

            <table class="table table-dark table-bordered mt-3">
                <thead>
                    <tr>
                        <th>Question</th>
                        <th>Correct</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for q in questions %}
                    <tr>
                        <td>{{ q['question'] }}</td>

                        <td style="color:#22c55e;">
                            {{ q['correct_answer'] }}
                        </td>

                        <td>
                            <a href="/delete_question/{{ q['id'] }}/{{ exam_id }}"
                               class="btn btn-danger btn-sm">
                                ❌ Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>

    </div>

</body>
</html>
